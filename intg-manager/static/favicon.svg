<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0f172a"/>
  
  <!-- Connection nodes -->
  <circle cx="16" cy="8" r="2.5" fill="url(#grad)"/>
  <circle cx="24" cy="16" r="2.5" fill="url(#grad)"/>
  <circle cx="16" cy="24" r="2.5" fill="url(#grad)"/>
  <circle cx="8" cy="16" r="2.5" fill="url(#grad)"/>
  
  <!-- Central hub -->
  <circle cx="16" cy="16" r="4" fill="url(#grad)"/>
  
  <!-- Connection lines -->
  <line x1="16" y1="8" x2="16" y2="12" stroke="#2563eb" stroke-width="1.5" opacity="0.6"/>
  <line x1="24" y1="16" x2="20" y2="16" stroke="#2563eb" stroke-width="1.5" opacity="0.6"/>
  <line x1="16" y1="24" x2="16" y2="20" stroke="#2563eb" stroke-width="1.5" opacity="0.6"/>
  <line x1="8" y1="16" x2="12" y2="16" stroke="#2563eb" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Diagonal connection hints -->
  <line x1="13" y1="13" x2="11" y2="11" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
  <line x1="19" y1="13" x2="21" y2="11" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
  <line x1="19" y1="19" x2="21" y2="21" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
  <line x1="13" y1="19" x2="11" y2="21" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
</svg>
