<!-- Delete IR Codeset Confirmation Modal Content -->
<div class="space-y-4">
    <!-- Warning Message -->
    <div class="flex items-start gap-3 p-4 bg-red-50 dark:bg-red-500/10 border border-red-400 dark:border-red-500/30 rounded-lg">
        <i class="fas fa-exclamation-triangle text-red-600 dark:text-red-400 text-xl mt-0.5"></i>
        <div>
            <p class="text-red-800 dark:text-red-300 font-medium">Delete Custom IR Codeset?</p>
            <p class="text-gray-700 dark:text-gray-400 text-sm mt-1">
                This will permanently delete <strong class="text-gray-900 dark:text-white">{{ device_name }}</strong> and all learned codes within this codeset.
            </p>
        </div>
    </div>
    
    <!-- Action Buttons -->
    <div class="flex gap-3">
        <button
            onclick="closeModal()"
            class="flex-1 px-4 py-2.5 bg-gray-100 dark:bg-uc-darker hover:bg-gray-200 dark:hover:bg-uc-card border border-uc-light-border dark:border-uc-border rounded-lg text-gray-700 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white font-medium transition-colors">
            Cancel
        </button>
        <button
            hx-delete="/api/ir/codesets/{{ device_id }}"
            hx-target="#codeset-{{ device_id }}"
            hx-swap="outerHTML"
            hx-on::before-request="closeModal()"
            class="flex-1 px-4 py-2.5 bg-red-600 dark:bg-red-500/20 hover:bg-red-700 dark:hover:bg-red-500/30 text-white dark:text-red-300 font-medium rounded-lg transition-colors flex items-center justify-center gap-2 border border-red-700 dark:border-red-500/30">
            <i class="fas fa-trash-alt"></i>
            Delete Codeset
        </button>
    </div>
    
    <p class="text-xs text-gray-600 dark:text-gray-500 text-center">
        <i class="fa-solid fa-info-circle mr-1"></i>
        This action cannot be undone
    </p>
</div>
