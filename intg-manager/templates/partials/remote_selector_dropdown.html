<!-- Remote Selector Dropdown -->
<div class="relative inline-block text-left">
    <button id="remote-selector-button"
            type="button"
            class="inline-flex items-center justify-between w-full px-4 py-2 text-sm font-medium text-gray-700 bg-white dark:bg-gray-800 dark:text-gray-200 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
            aria-expanded="false">
        <span id="selected-remote-name">
            {% for remote in remotes %}
                {% if remote.active %}{{ remote.name }}{% endif %}
            {% endfor %}
        </span>
        <svg class="ml-2 -mr-1 h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
        </svg>
    </button>
 
    <div id="remote-selector-menu"
         class="hidden origin-top-right absolute right-0 mt-2 w-64 rounded-md shadow-lg bg-white dark:bg-gray-700 ring-1 ring-black dark:ring-gray-600 ring-opacity-5 focus:outline-none z-50"
         role="menu"
         aria-orientation="vertical"
         aria-labelledby="remote-selector-button">
        <div class="py-1.5" role="none">
            {% for remote in remotes %}
            <button type="button"
                    class="remote-selector-item block w-full text-left px-4 py-3 text-sm {% if remote.active %}bg-blue-50 dark:bg-blue-900 text-blue-700 dark:text-blue-300 font-semibold{% else %}text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600{% endif %}"
                    data-remote-id="{{ remote.id }}"
                    role="menuitem">
                <div class="flex items-center">
                    <span class="inline-flex items-center mr-2" style="width: 1rem;">
                        {% if remote.connected %}
                        <svg class="h-3 w-3 text-green-500" fill="currentColor" viewBox="0 0 8 8">
                            <circle cx="4" cy="4" r="3" />
                        </svg>
                        {% else %}
                        <svg class="h-3 w-3 text-gray-400" fill="currentColor" viewBox="0 0 8 8">
                            <circle cx="4" cy="4" r="3" />
                        </svg>
                        {% endif %}
                    </span>
                    <div>
                        <div class="font-medium">{{ remote.name }}</div>
                        <div class="text-xs {% if remote.active %}text-blue-600 dark:text-blue-400{% else %}text-gray-500 dark:text-gray-400{% endif %}">
                            {{ remote.address }}
                        </div>
                    </div>
                </div>
            </button>
            {% endfor %}
            
            <!-- Separator -->
            <div class="border-t border-gray-200 dark:border-gray-600 my-1"></div>
            
            <!-- Add Remote Link -->
            <a href="http://{{ remotes[0].address if remotes else 'localhost' }}"
               target="_blank"
               class="block w-full text-left px-4 py-3 text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-600 hover:text-gray-800 dark:hover:text-gray-200"
               role="menuitem">
                <div class="flex items-center">
                    <svg class="h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                    <div>
                        <div class="font-medium">Add Another Remote</div>
                        <div class="text-xs text-gray-500 dark:text-gray-500">
                            Run setup to configure additional remotes
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

<script>
// Remote selector dropdown toggle
document.getElementById('remote-selector-button').addEventListener('click', function() {
    const menu = document.getElementById('remote-selector-menu');
    menu.classList.toggle('hidden');
});

// Close dropdown when clicking outside
document.addEventListener('click', function(event) {
    const button = document.getElementById('remote-selector-button');
    const menu = document.getElementById('remote-selector-menu');
    if (!button.contains(event.target) && !menu.contains(event.target)) {
        menu.classList.add('hidden');
    }
});

// Handle remote selection
document.querySelectorAll('.remote-selector-item').forEach(button => {
    button.addEventListener('click', function() {
        const remoteId = this.dataset.remoteId;
        
        // Update session and localStorage
        fetch('/api/active-remote', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ remote_id: remoteId })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'ok') {
                // Store in localStorage for persistence
                localStorage.setItem('active_remote_id', remoteId);
                
                // Reload page to refresh all data for new remote
                window.location.reload();
            } else {
                console.error('Failed to switch remote:', data.error);
                alert('Failed to switch remote: ' + data.error);
            }
        })
        .catch(error => {
            console.error('Error switching remote:', error);
            alert('Error switching remote: ' + error);
        });
    });
});

// On page load, sync localStorage with session
window.addEventListener('DOMContentLoaded', function() {
    const storedRemoteId = localStorage.getItem('active_remote_id');
    if (storedRemoteId) {
        // Ensure session matches localStorage
        fetch('/api/active-remote')
            .then(response => response.json())
            .then(data => {
                if (data.id !== storedRemoteId) {
                    // Session differs, update it
                    fetch('/api/active-remote', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ remote_id: storedRemoteId })
                    });
                }
            })
            .catch(error => console.error('Error syncing remote:', error));
    }
});
</script>
